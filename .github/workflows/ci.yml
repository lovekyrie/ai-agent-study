name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Build packages
        run: pnpm build

      - name: Run tests
        run: pnpm test
        env:
          OPENAI_API_KEY: test-key
          DATABASE_URL: postgresql://localhost:5432/test
          SECRET_KEY: ci-test-secret-key-long-enough-for-validation
          JWT_SECRET: ci-test-jwt-secret-long-enough-for-validation
